name: Deploy to Vercel

on:
  push:
    branches: [master, develop]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --base-href /

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Prepare deploy folder outside git repo
        run: |
          mkdir -p "$RUNNER_TEMP/deploy"
          cp -r build/web/. "$RUNNER_TEMP/deploy/"

      - name: Deploy Preview (develop)
        if: github.ref == 'refs/heads/develop'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy "$RUNNER_TEMP/deploy" --token="${{ secrets.VERCEL_TOKEN }}" --yes

      - name: Deploy Production (master)
        if: github.ref == 'refs/heads/master'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy "$RUNNER_TEMP/deploy" --token="${{ secrets.VERCEL_TOKEN }}" --prod --yes
